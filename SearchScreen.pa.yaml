Screens:
  SearchScreen:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - Header_4:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - Gallery4:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageTwoColumnVariant_ver5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            DelayItemLoading: =true
            Height: =905
            Items: |-
              =Filter
              ( 
                  List_Products, 
                  Lower(SearchTxt.Text) in Lower(CATEGORY) || 
                  Lower(SearchTxt.Text) in Lower(PRODUCTNAME) || 
                  Lower(SearchTxt.Text) in Lower(PLATFORM) ||
                  Lower(SearchTxt.Text) in Lower(Search_Item)
              )
            LoadingSpinner: =LoadingSpinner.Data
            OnSelect: |+
              =Set(varSelectedProduct, ThisItem);
              Navigate(ProductDetailScreen);
            TemplateSize: =478
            Transition: =Transition.Pop
            Y: =167
          Children:
            - Image:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =Min(Self.Width, Parent.TemplateHeight - 115)
                  Image: =ThisItem.IMAGEURL
                  OnSelect: =Select(Parent)
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =Parent.TemplateWidth - 32
                  X: =16
                  Y: =16
            - Name:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =RGBA(50, 49, 48, 1)
                  Font: =Font.'Lato Black'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =25
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =15
                  Text: =ThisItem.PRODUCTNAME
                  VerticalAlign: =VerticalAlign.Top
                  Width: =288
                  X: =16
                  Y: =319
            - Price:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: |-
                    =If(
                        Value(Substitute(ThisItem.DISCOUNTPRICE, "%", "")) >= 500, Color.Green,
                        Value(Substitute(ThisItem.DISCOUNTPRICE, "%", "")) >= 200, Color.Orange,
                        Color.Red
                    )
                  Font: =Font.'Lato Black'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =20
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =15
                  Text: =ThisItem.Discount  & "% OFF"
                  VerticalAlign: =VerticalAlign.Top
                  Width: =157
                  X: =16
                  Y: =344
            - Rating:
                Control: Label@2.5.1
                Properties:
                  BorderColor: |-
                    =If(
                        Value(ThisItem.RATING) >= 4.5, RGBA(0,128,0,1),
                        Value(ThisItem.RATING) >= 3, RGBA(255,152,0,1),
                        RGBA(244,67,54,1)
                    )
                  Color: |-
                    =If(
                        Value(ThisItem.RATING) >= 4.5, RGBA(0,128,0,1),
                        Value(ThisItem.RATING) >= 3, RGBA(255,152,0,1),
                        RGBA(244,67,54,1)
                    )
                  Font: =Font.'Open Sans'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =22
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =15
                  Text: ="⭐ " & ThisItem.RATING
                  VerticalAlign: =VerticalAlign.Top
                  Width: =77
                  X: =16
                  Y: =398
            - DiscountPrice:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =Color.Black
                  Font: =Font.'Lato Black'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =20
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =15
                  Text: ="₹ " & ThisItem.DISCOUNTPRICE
                  VerticalAlign: =VerticalAlign.Top
                  Width: =65
                  X: =16
                  Y: =371
            - Button3:
                Control: ModernButton@1.0.0
                Properties:
                  Height: =39
                  OnSelect: =Launch(ThisItem.PURCHASELINK)
                  Text: ="BuyNow"
                  Width: =288
                  X: =16
                  Y: =435
      - Header_5:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(215, 223, 240, 1)
            Height: =64
            Width: =640
            Y: =1072
      - Container:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =ColorValue("#E3562B")
            Height: =64
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutWrap: =true
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =640
            Y: =1072
          Children:
            - Homeicon_1:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Home
                  OnSelect: =Navigate(HomeScreen)
                  Width: =44
                  X: =87
                  Y: =761
            - Searchicon_1:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Search
                  OnSelect: =Navigate(SearchScreen)
                  Width: =44
                  X: =189
                  Y: =777
            - Wishlisticon_1:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =35
                  Icon: =Icon.Support
                  OnSelect: =Launch("https://share.chatling.ai/s/PjD8JKwqYbE7ELC")
                  Width: =44
                  X: =327
                  Y: =801
            - Icon1:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =44
                  Icon: =Icon.ListScrollWatchlist
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  OnSelect: =Navigate(CategoriesScreen)
                  Width: =44
            - Profileicon_1:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Person
                  OnSelect: =Navigate(ProfileScreen)
                  Width: =44
                  X: =523
                  Y: =701
      - SearchTxt:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Default: =
            Font: =Font.'Open Sans'
            Height: =60
            HintText: ="Search Required Items"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverFill: =RGBA(186, 202, 226, 1)
            PaddingLeft: =50
            Width: =592
            X: =24
            Y: =93
      - Searchitemsicon:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =40
            Icon: =Icon.Search
            Width: =44
            X: =24
            Y: =103
      - Icon11:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Height: =49
            Icon: =Icon.Heart
            OnSelect: =Navigate(FavoritesScreen)
            Width: =47
            X: =569
            Y: =7
      - Icon10_3:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Height: =40
            Icon: =Icon.BackArrow
            OnSelect: =Navigate(HomeScreen)
            Width: =44
            X: =7
            Y: =12
      - Icon2:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Height: =56
            Icon: =Icon.More
            OnSelect: =Navigate('More Screen')
            Width: =63
            X: =479
