          Variant: AutoLayout
          Properties:
            Fill: =ColorValue("#E3562B")
            Height: =64
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutWrap: =true
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =640
            Y: =1072
          Children:
            - Homeicon_3:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Home
                  OnSelect: =Navigate(HomeScreen)
                  Width: =44
                  X: =87
                  Y: =761
            - Searchicon_2:
