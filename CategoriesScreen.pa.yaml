Screens:
  CategoriesScreen:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - Header_7:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - Gallery4_1:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageTwoColumnVariant_ver5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            DelayItemLoading: =true
            Height: =1006
            Items: =MainCategories
            LoadingSpinner: =LoadingSpinner.Data
            OnSelect: |-
              =Set(SelectedCategory, ThisItem.Title);
              Navigate(SubCategoriesScreen)
            TemplateSize: =431
            Transition: =Transition.Pop
            Y: =64
          Children:
            - Image_1:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =Min(Self.Width, Parent.TemplateHeight - 115)
                  Image: =ThisItem.CategoryimageLink
                  ImagePosition: =ImagePosition.Fill
                  OnSelect: =Select(Parent)
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =Parent.TemplateWidth - 32
                  X: =16
                  Y: =16
            - Label2:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  Height: =80
                  OnSelect: =Select(Parent)
                  Size: =25
                  Text: =ThisItem.Title
                  Width: =288
                  X: =16
                  Y: =302
      - Header_8:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(215, 223, 240, 1)
            Height: =64
            Width: =640
            Y: =1072
      - Container_1:
