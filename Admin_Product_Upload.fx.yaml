    Button4 As modernButton:
        Height: =64
        OnSelect: |-
            =If(
                IsBlank(DataCardValue_1.Text) ||
                IsBlank(DataCardValue_2.Text) ||
                IsBlank(DataCardValue_3.Text) ||
                IsBlank(DataCardValue_4.Text) ||
                !IsNumeric(DataCardValue_4.Text),
            
                Notify(
                    "Please enter valid product details",
                    NotificationType.Error
                ),
            
                Patch(
                    Product_List,
                    Defaults(Product_List),
                    {
                        PRODUCTNAME: DataCardValue_1.Text,
                        CATEGORY: DataCardValue_2.Text,
                        BRAND: DataCardValue_3.Text,
                        PRICE: Value(DataCardValue_4.Text),
                        DISCOUNTPRICE: Value(DataCardValue_5.Text),
                        RATING: Value(DataCardValue_6.Text),
                        STOCKSTATUS: DataCardValue_7.Text,
                        IMAGEURL: DataCardValue_8.Text,
                        FEATURES: DataCardValue_15.Text,
                        DISCOUNT: Value(DataCardValue_14.Text),
                        PLATFORM: DataCardValue_11.Text,
                        PURCHASELINK: DataCardValue_10.Text,
                        DESCRIPTION: DataCardValue_13.Text,
                        SEARCH_ITEM: DataCardValue_16.Text,
                        'Sub Category': DataCardValue_12.Text
                    }
                );
            
                Notify(
                    "Product Uploaded Successfully",
                    NotificationType.Success
                )
            )
        Text: ="Submit"
        Width: =280
        X: =180
        Y: =1056
        ZIndex: =11

