            DisplayMode: =
            Height: =45
            Icon: =Icon.Lock
            Width: =36
            X: =49
            Y: =487
      - Submit:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisplayMode: =
            Fill: =ColorValue("#E3562B")
            Font: =Font.'Open Sans'
            Height: =56
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnSelect: |-
              =With(
                  {
                      existingUser: LookUp(
                          'User (Student/Buyer)',
                          Email = txtEmail.Text
                      )
                  },
                  Patch(
                      'User (Student/Buyer)',
                      If(
                          IsBlank(existingUser),
                          Defaults('User (Student/Buyer)'),   // ➕ Create
                          existingUser                        // ✏️ Update
                      ),
                      {
                          Full_Name: FullName.Text,
                          Username: UserName_lbl.Text,
                          Email: txtEmail.Text,
                          Phone_Number: Value(PhoneNumber.Text),
                          Gender: Gender.Selected.Value,
                          Date_Joined: Today()
                      }
                  )
              );

              Notify("User Saved Successfully", NotificationType.Success);

              Reset(FullName);
              Reset(UserName_lbl);
              Reset(txtEmail);
              Reset(PhoneNumber);
              Reset(Gender);

              Navigate(LoginScreen_user);
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Text: ="Submit"
            Width: =176
            X: =229
            Y: =1034
