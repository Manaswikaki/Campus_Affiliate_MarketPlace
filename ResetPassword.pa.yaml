Screens:
  ResetPassword:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      ImagePosition: =ImagePosition.Fill
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - Header_1:
          Control: Rectangle@2.3.0
          Group: Group3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - BackGround_1:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#FAF4DF")
            Height: =675
            Width: =581
            X: =27
            Y: =258
      - LoginLabel_1:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Text: ="Reset Password"
            X: =40
            Y: =290
      - EmailLabel_1:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Text: |-
              ="New Password
              "
            X: =48
            Y: =373
      - NewPassword_input:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: |-
              =If(
                  IsBlank(Self.Text),
                  RGBA(0,11,102,1),
                  If(
                      IsMatch(
                          Self.Text,
                          "^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}$"
                      ),
                      RGBA(0,13,107,1),
                      Color.Red
                  )
              )
            Default: =
            Font: =Font.'Open Sans'
            HintText: ="Enter your Email"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverFill: =RGBA(186, 202, 226, 1)
            Mode: =If(varShowPassword, TextMode.SingleLine, TextMode.Password)
            PaddingLeft: =50
            Width: =541
            X: =48
            Y: =443
      - PasswordLabel_1:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Text: |-
              ="Confirm Paasword
              "
            X: =46
            Y: =516
      - Confirm_Password_Input:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: |-
              =If(
                  Self.Text = NewPassword_input.Text,
                  RGBA(0,13,107,1),
                  Color.Red
              )
            Default: =
            Font: =Font.'Open Sans'
            HintText: ="Enter your Password"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverFill: =RGBA(186, 202, 226, 1)
            Mode: =If(varShowPassword, TextMode.SingleLine, TextMode.Password)
            PaddingLeft: =50
            Width: =541
            X: =46
            Y: =586
      - Passwordicon_1:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =44
            Icon: =Icon.Lock
            Width: =36
            X: =51
            Y: =599
      - ViewIcon_1:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =44
            Icon: =If(varShowPassword, Icon.Hide, Icon.View)
            OnSelect: =Set(varShowPassword, !varShowPassword)
            Width: =36
            X: =538
            Y: =599
      - labelError_1:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Height: =30
            Size: =15
            Text: ="Password should be correct."
            Visible: =showError
            Width: =555
            X: =51
            Y: =691
      - Loginbutton_1:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisplayMode: |-
              =If(
                  !IsBlank(NewPassword_input.Text) &&
                  !IsBlank(Confirm_Password_Input.Text) &&
                  IsMatch(
                      NewPassword_input.Text,
                      "^(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9]).{8,}$"
                  ) &&
                  Trim(Confirm_Password_Input.Text) = Trim(NewPassword_input.Text),
                  DisplayMode.Edit,
                  DisplayMode.Disabled
              )
            Fill: =ColorValue("#E3562B")
            Font: =Font.'Open Sans'
            Height: =56
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnSelect: |-
              =If(
                  NewPassword_input.Text <> Confirm_Password_Input.Text,

                  // ❌ Password mismatch
                  Notify("❌ Passwords do not match", NotificationType.Error),

                  // ✅ Update password for correct user
                  Patch(
                      Student_Credentials,
                      LookUp(
                          Student_Credentials,
                          User_Email = varResetEmail
                      ),
                      {
                          Password: NewPassword_input.Text
                      }
                  );

                  Notify("✅ Password updated successfully", NotificationType.Success);

                  Navigate(LoginScreen_user, ScreenTransition.Fade)
              );
              Reset(NewPassword_input);
              Reset(Confirm_Password_Input);
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Text: |-
              ="Reset
              "
            Width: =176
            X: =224
            Y: =766
      - ViewIcon_2:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =44
            Icon: =If(varShowPassword, Icon.Hide, Icon.View)
            OnSelect: =Set(varShowPassword, !varShowPassword)
            Width: =36
            X: =538
            Y: =456
      - Passwordicon_2:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =44
            Icon: =Icon.Lock
            Width: =36
            X: =51
            Y: =451
      - Icon10:
          Control: Classic/Icon@2.5.0
          Group: Group3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Fill: =ColorValue("#E3562B")
            Height: =40
            Icon: =Icon.BackArrow
            OnSelect: =Navigate(LoginScreen_user)
            Width: =44
            X: =7
            Y: =12
