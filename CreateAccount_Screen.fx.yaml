CreateAccount_Screen As screen:
    BackgroundImage: =
    Fill: =RGBA(255, 255, 255, 1)
    ImagePosition: =ImagePosition.Fill

    BackGround_2 As rectangle:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        Height: =811
        Width: =600
        X: =20
        Y: =255
        ZIndex: =3

    LoginLabel_2 As label:
        Align: =Align.Center
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        FontWeight: =FontWeight.Bold
        Height: =70
        Size: =21
        Text: ="Create Account for User"
        Width: =560
        X: =40
        Y: =286
        ZIndex: =4

    EmailLabel_2 As label:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        FontWeight: =FontWeight.Semibold
        Height: =70
        Size: =21
        Text: |-
            ="New Password
            "
        Width: =560
        X: =51
        Y: =514
        ZIndex: =5

    NewPassword_input_1 As text:
        BorderColor: |-
            =If(
                IsBlank(Self.Text),
                RGBA(0,11,102,1),
                If(
                    IsMatch(
                        Self.Text,
                        "^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}$"
                    ),
                    RGBA(0,13,107,1),
                    Color.Red
                )
            )
        Default: =
        DisplayMode: =
        Font: =Font.'Lato Black'
        Height: =70
        HintText: ="Enter your Email"
        Mode: =If(varShowPassword, TextMode.SingleLine, TextMode.Password)
        PaddingLeft: =50
        Size: =21
        Width: =541
        X: =49
        Y: =583
        ZIndex: =6

    Passwordicon_3 As icon:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        Height: =44
        Icon: =Icon.Lock
        Width: =36
        X: =52
        Y: =591
        ZIndex: =7

    ViewIcon_3 As icon:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        Height: =44
        Icon: =If(varShowPassword, Icon.Hide, Icon.View)
        OnSelect: =Set(varShowPassword, !varShowPassword)
        Width: =36
        X: =539
        Y: =596
        ZIndex: =8

    PasswordLabel_2 As label:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        FontWeight: =FontWeight.Semibold
        Height: =70
        Size: =21
        Text: |-
            ="Confirm Paasword
            "
        Width: =560
        X: =47
        Y: =656
        ZIndex: =9

    Confirm_Password_Input_1 As text:
        BorderColor: |-
            =If(
                Self.Text = NewPassword_input_1.Text,
                RGBA(0,13,107,1),
                Color.Red
            )
        Default: =
        DisplayMode: =
        Font: =Font.'Lato Black'
        Height: =70
        HintText: ="Enter your Password"
        Mode: =If(varShowPassword, TextMode.SingleLine, TextMode.Password)
        PaddingLeft: =50
        Size: =21
        Width: =541
        X: =47
        Y: =726
        ZIndex: =10

    Passwordicon_4 As icon.Lock:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        Height: =44
        Icon: =Icon.Lock
        Width: =36
        X: =52
        Y: =739
        ZIndex: =11

    ViewIcon_4 As icon.View:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        Height: =44
        Icon: =If(varShowPassword, Icon.Hide, Icon.View)
        OnSelect: =Set(varShowPassword, !varShowPassword)
        Width: =36
        X: =539
        Y: =739
        ZIndex: =12

    labelError_2 As label:
        Height: =30
        Size: =15
        Text: ="Password should be correct."
        Visible: =showError
        Width: =555
        X: =51
        Y: =691
        ZIndex: =13

    Loginbutton_2 As button:
        DisplayMode: |-
            =If(
                !IsBlank(NewPassword_input_1.Text) &&
                !IsBlank(Confirm_Password_Input_1.Text) &&
                IsMatch(
                    NewPassword_input_1.Text,
                    "^(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9]).{8,}$"
                ) &&
                Trim(Confirm_Password_Input_1.Text) = Trim(NewPassword_input_1.Text),
                DisplayMode.Edit,
                DisplayMode.Disabled
            )
        Fill: |-
            =ColorValue("#E3562B")
        Height: =56
        OnSelect: |-
            =If(
                // ❌ Only allow college emails
                !(
                    EndsWith(Lower(Email_input.Text), "@acet.ac.in") ||
                    EndsWith(Lower(Email_input.Text), "@aec.edu.in")
                ),
                Notify(
                    "❌ Use your college email only (@acet.ac.in or @aec.edu.in)",
                    NotificationType.Error
                ),
            
                // ❌ Duplicate email check
                !IsBlank(
                    LookUp(
                        Student_Credentials,
                        Lower(User_Email) = Lower(Email_input.Text)
                    )
                ),
                Notify("❌ This email already exists", NotificationType.Error),
            
                // ❌ Password mismatch check
                NewPassword_input_1.Text <> Confirm_Password_Input_1.Text,
                Notify("❌ Passwords do not match", NotificationType.Error),
            
                // ✅ If all conditions pass
                Patch(
                    Student_Credentials,
                    Defaults(Student_Credentials),
                    {
                        User_Email: Email_input.Text,
                        Password: NewPassword_input_1.Text
                    }
                );
            
                Set(varUserEmail, Email_input.Text);
            
                Notify("✅ Account created successfully", NotificationType.Success);
            
                Reset(Email_input);
                Reset(NewPassword_input_1);
                Reset(Confirm_Password_Input_1);
            
                Navigate(PersonalDetails_Screen, ScreenTransition.Fade)
            )
        Size: =24
        Text: ="CREATE"
        Width: =176
        X: =225
        Y: =906
        ZIndex: =14

    Group3_2 As group:
        Height: =5
        Width: =5
        X: =60
        Y: =60
        ZIndex: =15

        Header_2 As rectangle:
            Fill: |-
                =ColorValue("#E3562B")
            Height: =64
            Width: =640
            ZIndex: =1

        Icon10_9 As icon.BackArrow:
            Fill: |-
                =ColorValue("#E3562B")
            Height: =40
            Icon: =Icon.BackArrow
            OnSelect: =Navigate(LoginScreen_user)
            Width: =44
            X: =7
            Y: =12
            ZIndex: =2

    Email_input As text:
        BorderColor: |-
            =If(
                IsBlank(Self.Text),
                RGBA(0,11,102,1),
            
                If(
                    IsMatch(
                        Self.Text,
                        "^[0-9]{2}[a-zA-Z]{1,3}[0-9]{1,3}[a-zA-Z][0-9]{3,4}@(acet\.ac\.in|aec\.adu\.in)$"
                    ),
                    RGBA(0,13,107,1),
                    Color.Red
                )
            )
        Default: =
        DisabledFill: =RGBA(255, 255, 255, 1)
        DisplayMode: =
        Font: =Font.'Lato Black'
        Height: =70
        HintText: ="Enter your Email"
        OnSelect: =Set(showError, false)
        PaddingLeft: =50
        Size: =21
        Width: =541
        X: =48
        Y: =443
        ZIndex: =18

    usericon_1 As icon:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        Height: =44
        Icon: =Icon.AddUser
        Width: =36
        X: =51
        Y: =456
        ZIndex: =19

    EmailLabel_3 As label:
        DisplayMode: =
        Fill: |-
            =ColorValue("#FAF4DF")
        FontWeight: =FontWeight.Semibold
        Height: =70
        Size: =21
        Text: ="Email "
        Width: =560
        X: =48
        Y: =373
        ZIndex: =20

