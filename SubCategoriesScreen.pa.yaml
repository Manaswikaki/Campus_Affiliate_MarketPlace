Screens:
  SubCategoriesScreen:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - Header_9:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - Gallery4_2:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageTwoColumnVariant_ver5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            DelayItemLoading: =true
            Height: =1006
            Items: |-
              =If(
                  IsBlank(SelectedCategory),
                  Categories,
                  Filter(
                      Categories,
                      Title = SelectedCategory
                  )
              )
            LoadingSpinner: =LoadingSpinner.Data
            OnSelect: =
            TemplateSize: =360
            Transition: =Transition.Pop
            Y: =64
          Children:
            - Image_2:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =200
                  Image: =ThisItem.Imageurl
                  OnSelect: =Select(Parent)
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =Parent.TemplateWidth - 32
                  X: =16
                  Y: =16
            - Label1:
                Control: Label@2.5.1
                Properties:
                  AutoHeight: =true
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  Height: =27
                  OnSelect: =Select(Parent)
                  Size: =18
                  Text: =ThisItem.'Sub Category'
                  Width: =273
                  X: =16
                  Y: =216
            - Button1:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  Height: =39
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: =Launch(ThisItem.'Product Link')
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Size: =20
                  Text: ="Buy Now"
                  Width: =288
                  X: =16
                  Y: =295
      - Header_10:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(215, 223, 240, 1)
            Height: =64
            Width: =640
            Y: =1072
      - Container_2:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =ColorValue("#E3562B")
            Height: =64
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutWrap: =true
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =640
            Y: =1072
          Children:
            - Homeicon_4:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Home
                  OnSelect: =Navigate(HomeScreen)
                  Width: =44
                  X: =87
                  Y: =761
            - Searchicon_3:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Search
                  OnSelect: =Navigate(SearchScreen)
                  Width: =44
                  X: =189
                  Y: =777
            - Wishlisticon_3:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =35
                  Icon: =Icon.Support
                  OnSelect: =Launch("https://share.chatling.ai/s/PjD8JKwqYbE7ELC")
                  Width: =44
                  X: =327
                  Y: =801
            - Icon1_2:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =44
                  Icon: =Icon.ListScrollWatchlist
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  OnSelect: =Navigate(CategoriesScreen)
                  Width: =44
            - Profileicon_3:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Person
                  OnSelect: =Navigate(ProfileScreen)
                  Width: =44
                  X: =523
                  Y: =701
      - Icon12_3:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Height: =45
            Icon: =Icon.Heart
            OnSelect: =Navigate(FavoritesScreen)
            Width: =49
            X: =573
            Y: =9
      - Icon10_7:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Height: =40
            Icon: =Icon.BackArrow
            OnSelect: =Navigate(CategoriesScreen)
            Width: =44
            X: =7
            Y: =12
