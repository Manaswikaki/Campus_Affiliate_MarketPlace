        Profileicon_5 As icon:
            Color: |-
                =ColorValue("#FAF4DF")
            FillPortions: =1
            Height: =40
            Icon: =Icon.Person
            LayoutMaxHeight: =0
            LayoutMaxWidth: =0
            OnSelect: =Navigate(ProfileScreen)
            Width: =44
            X: =523
            Y: =701
            ZIndex: =5

    Header_12 As rectangle:
        Fill: |-
            =ColorValue("#E3562B")
        Height: =64
        Width: =640
        ZIndex: =2

    Icon10_5 As icon:
        Color: |-
            =ColorValue("#FAF4DF")
        Height: =40
        Icon: =Icon.BackArrow
        OnSelect: =Navigate(SearchScreen)
