            LayoutMaxHeight: =0
            LayoutMaxWidth: =0
            OnSelect: |-
                =Launch("https://share.chatling.ai/s/PjD8JKwqYbE7ELC")
            Width: =44
            X: =327
            Y: =801
            ZIndex: =3

        Icon1_5 As icon:
            Color: |-
                =ColorValue("#FAF4DF")
            FillPortions: =1
            Height: =44
            Icon: =Icon.ListScrollWatchlist
            LayoutMaxHeight: =0
            LayoutMaxWidth: =0
            LayoutMinHeight: =16
            LayoutMinWidth: =16
            OnSelect: =Navigate(CategoriesScreen)
            Width: =44
