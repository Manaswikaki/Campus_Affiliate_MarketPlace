Screens:
  EnterOTP:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      ImagePosition: =ImagePosition.Fill
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - Header_otp:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - BackGround_otp:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#FAF4DF")
            Height: =675
            Width: =581
            X: =27
            Y: =258
      - otpmainlabel:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Text: ="Enter OTP To Reset the Password"
            X: =32
            Y: =324
      - otplabel:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Text: ="OTP"
            X: =45
            Y: =443
      - otpinput:
          Control: Classic/TextInput@2.3.2
          Group: Group2_1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Default: =
            Font: =Font.'Open Sans'
            HintText: ="Enter your OTP"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverFill: =RGBA(186, 202, 226, 1)
            PaddingLeft: =50
            Width: =541
            X: =48
            Y: =513
      - otpicon:
          Control: Classic/Icon@2.5.0
          Group: Group2_1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =44
            Icon: =Icon.AddUser
            Width: =36
            X: =51
            Y: =526
      - Validatebutton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisplayMode: |-
              =If(
                  !IsBlank(otpinput.Text) &&
                  Text(
                      LookUp(
                          Student_Credentials,
                          User_Email = varResetEmail,
                          OTP
                      )
                  ) = Trim(otpinput.Text),

                  DisplayMode.Edit,
                  DisplayMode.Disabled
              )
            Fill: =ColorValue("#E3562B")
            Font: =Font.'Open Sans'
            Height: =51
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnSelect: |-
              =Reset(otpinput);
              Navigate(ResetPassword);
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Size: =20
            Text: |-
              ="Validate
              "
            Width: =161
            X: =222
            Y: =668
      - Icon10_2:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Height: =40
            Icon: =Icon.BackArrow
            OnSelect: =Navigate(LoginScreen_user)
            Width: =44
            X: =7
            Y: =12
