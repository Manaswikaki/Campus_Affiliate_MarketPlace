Screens:
  EnterEmail:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      ImagePosition: =ImagePosition.Fill
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - BackGround_enter:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#FAF4DF")
            Height: =675
            Width: =581
            X: =27
            Y: =258
      - EnterLabel:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Text: ="Enter Email To Reset the Password"
            X: =32
            Y: =324
      - EmailLabel_Enter:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Text: ="Email "
            X: =45
            Y: =443
      - Userinput_enter:
          Control: Classic/TextInput@2.3.2
          Group: Group2
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Default: =
            Font: =Font.'Open Sans'
            HintText: ="Enter your Email"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverFill: =RGBA(186, 202, 226, 1)
            PaddingLeft: =50
            Width: =541
            X: =48
            Y: =513
      - usericon_enter:
          Control: Classic/Icon@2.5.0
          Group: Group2
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =44
            Icon: =Icon.AddUser
            Width: =36
            X: =51
            Y: =526
      - InvalidEmailError:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Height: =30
            Size: =15
            Text: ="Email is Invalid.Please Enter Valid Email."
            Visible: =showError
            Width: =555
            X: =45
            Y: =638
      - SendOTPbutton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =ColorValue("#E3562B")
            Font: =Font.'Open Sans'
            Height: =51
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnSelect: |-
              =// 🔹 Reset error first
              UpdateContext({showInvalidEmail: false});
              // 🔹 Store entered email (IMPORTANT)
              Set(varResetEmail, Userinput_enter.Text);
              // 🔹 Check if email exists in SharePoint
              Set(
                  varUserRecord,
                  LookUp(
                      Student_Credentials,
                      User_Email = Userinput_enter.Text
                  )
              );
              If(
                  IsBlank(varUserRecord),
                  // ❌ Email NOT found
                  UpdateContext({showInvalidEmail: true}),
                  // ✅ Email exists → send OTP
                  Set(var_Otp, RandBetween(100000, 999999));
                  // Update OTP in SharePoint
                  Patch(
                      Student_Credentials,
                      varUserRecord,
                      { OTP: var_Otp }
                  );
                  // Send email to entered email (NOT User().Email)
                  Office365Outlook.SendEmailV2(
                      Userinput_enter.Text,
                      "Demo App - Reset Password OTP",
                      "Hi, you requested a password reset." & Char(10) &
                      "Your OTP is: " & var_Otp & Char(10) &
                      "Thank you!"
                  );
                  Navigate(EnterOTP);
                  Reset(Userinput_enter)
              )
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Size: =20
            Text: ="Send OTP"
            Width: =161
            X: =224
            Y: =728
      - Header_6:
          Control: Rectangle@2.3.0
          Group: Group3_1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - Icon10_1:
          Control: Classic/Icon@2.5.0
          Group: Group3_1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Fill: =ColorValue("#E3562B")
            Height: =40
            Icon: =Icon.BackArrow
            OnSelect: =Navigate(LoginScreen_user)
            Width: =44
            X: =7
            Y: =12
