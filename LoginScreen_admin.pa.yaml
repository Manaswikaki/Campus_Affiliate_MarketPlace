Screens:
  LoginScreen_admin:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      ImagePosition: =ImagePosition.Fill
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Set(showError, false)
    Children:
      - Header_3:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - BackGround_4:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#FAF4DF")
            Height: =675
            Width: =581
            X: =27
            Y: =258
      - LoginLabel_4:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Text: ="ADMIN LOGIN"
            X: =40
            Y: =290
      - EmailLabel_8:
          Control: Label@2.5.1
          Group: Group5_1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Text: ="Email "
            X: =48
            Y: =373
      - Userinput_1:
          Control: Classic/TextInput@2.3.2
          Group: Group5_1
          Properties:
            BorderColor: =ColorValue("#E3562B")
            Default: =
            Font: =Font.'Open Sans'
            HintText: ="Enter your Email"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverFill: =RGBA(186, 202, 226, 1)
            OnChange: |-
              =If(showError, UpdateContext({showError: false}))
            OnSelect: =Set(showError, false)
            PaddingLeft: =50
            Width: =541
            X: =48
            Y: =443
      - usericon_6:
          Control: Classic/Icon@2.5.0
          Group: Group5_1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#E3562B")
            Height: =44
            Icon: =Icon.AddUser
            Width: =36
            X: =51
            Y: =456
      - PasswordLabel_5:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Text: |-
              ="Paasword
              "
            X: =46
            Y: =516
      - Passwordinput_1:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =ColorValue("#E3562B")
            Default: =
            Font: =Font.'Open Sans'
            HintText: ="Enter your Password"
            HoverBorderColor: =RGBA(0, 18, 107, 1)
            HoverFill: =RGBA(186, 202, 226, 1)
            Mode: =If(varShowPassword, TextMode.SingleLine, TextMode.Password)
            OnChange: |-
              =If(showError, UpdateContext({showError: false}))
            OnSelect: =Set(showError, false)
            PaddingLeft: =50
            Width: =541
            X: =46
            Y: =586
      - Passwordicon_7:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#E3562B")
            Height: =44
            Icon: =Icon.Lock
            Width: =36
            X: =51
            Y: =599
      - ViewIcon_5:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =44
            Icon: =If(varShowPassword, Icon.Hide, Icon.View)
            OnSelect: =Set(varShowPassword, !varShowPassword)
            Width: =36
            X: =538
            Y: =599
      - labelError_3:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Height: =30
            Size: =15
            Text: ="Password or User Email is incorrect. Please Try Again."
            Visible: =showError
            Width: =555
            X: =51
            Y: =691
      - ForgetPasswordbutton_1:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(151, 0, 0, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisabledFill: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            Height: =38
            HoverBorderColor: =RGBA(0,0,0,0)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(0, 0, 0, 0)
            OnSelect: =Navigate(EnterEmail)
            PressedBorderColor: =RGBA(0,0,0,0)
            PressedColor: =Self.Fill
            PressedFill: =RGBA(0,0,0,0)
            Size: =12
            Text: ="Forgot Password"
            Width: =210
            X: =207
            Y: =735
      - Loginbutton_3:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =ColorValue("#E3562B")
            Font: =Font.'Open Sans'
            Height: =56
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnSelect: "=Set(\r\n    varAdmin,\r\n    LookUp(\r\n        'Admin (Affiliate)',\r\n        Lower(Trim(Email)) = Lower(Trim(Userinput_1.Text)) &&\r\n        Trim(Password) = Trim(Passwordinput_1.Text)\r\n    )\r\n);\r\n\r\nIf(\r\n    !IsBlank(varAdmin),\r\n    \r\n    // Success\r\n    Set(varadminEmail, varAdmin.Email);\r\n    UpdateContext({showError: false});\r\n    Navigate(Admin_Product_Upload, ScreenTransition.Fade),\r\n\r\n    // Invalid credentials\r\n    UpdateContext({showError: true})\r\n);\r\n\r\nReset(Userinput_1);\r\nReset(Passwordinput_1);"
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Text: ="Login"
            Width: =176
            X: =224
            Y: =794
      - Icon10_10:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Fill: =ColorValue("#E3562B")
            Height: =40
            Icon: =Icon.BackArrow
            OnSelect: =Navigate(LoginScreen)
            Width: =44
            X: =7
            Y: =12
