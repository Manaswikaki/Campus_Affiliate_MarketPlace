Screens:
  LoginScreen:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      ImagePosition: =ImagePosition.Fill
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Set(showError, false)
    Children:
      - Header_15:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - Create_2:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Icon: =Icon.Add
            OnSelect: =Navigate(CreateAccount_Screen)
            X: =576
      - BackGround_5:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#FAF4DF")
            Height: =332
            Width: =571
            X: =37
            Y: =357
      - LoginLabel_5:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Text: |-
              ="LOGIN
              "
            X: =37
            Y: =383
      - Administration_pic:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Height: =130
            Image: =administrator
            OnSelect: =Navigate(LoginScreen_admin)
            Width: =134
            X: =94
            Y: =486
      - User_pic:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Height: =130
            Image: =user
            OnSelect: =Navigate(LoginScreen_user)
            Width: =134
            X: =384
            Y: =486
