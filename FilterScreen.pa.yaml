            - Price_1:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: |-
                    =If(
                        Value(Substitute(ThisItem.DISCOUNTPRICE, "%", "")) >= 500, Color.Green,
                        Value(Substitute(ThisItem.DISCOUNTPRICE, "%", "")) >= 200, Color.Orange,
                        Color.Red
                    )
                  Font: =Font.'Lato Black'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =20
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =15
                  Text: =ThisItem.Discount & "%"
                  VerticalAlign: =VerticalAlign.Top
                  Width: =157
                  X: =16
                  Y: =344
            - Rating_1:
                Control: Label@2.5.1
                Properties:
                  BorderColor: |-
                    =If(
                        Value(ThisItem.RATING) >= 4.5, RGBA(0,128,0,1),
                        Value(ThisItem.RATING) >= 3, RGBA(255,152,0,1),
                        RGBA(244,67,54,1)
                    )
                  Color: |-
                    =If(
                        Value(ThisItem.RATING) >= 4,
                        RGBA(0, 97, 0, 1),        // Dark Green

                        Value(ThisItem.RATING) >= 3,
                        RGBA(156, 101, 0, 1),     // Dark Yellow/Orange

                        RGBA(156, 0, 6, 1)        // Dark Red
                    )
                  Fill: |-
                    =If(
                        Value(ThisItem.RATING) >= 4,
                        RGBA(198, 239, 206, 1),    // Light Green

                        Value(ThisItem.RATING) >= 3,
                        RGBA(255, 235, 156, 1),    // Light Yellow

                        RGBA(255, 199, 206, 1)     // Light Red
                    )
                  Font: =Font.'Lato Black'
