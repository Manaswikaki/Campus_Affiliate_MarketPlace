LoginScreen_admin As screen:
    BackgroundImage: =
    Fill: =RGBA(255, 255, 255, 1)
    ImagePosition: =ImagePosition.Fill
    OnVisible: =Set(showError, false)

    Header_3 As rectangle:
        Fill: |-
            =ColorValue("#E3562B")
        Height: =64
        Width: =640
        ZIndex: =1

    BackGround_4 As rectangle:
        Fill: |-
            =ColorValue("#FAF4DF")
        Height: =675
        Width: =581
        X: =27
        Y: =258
        ZIndex: =3

    LoginLabel_4 As label:
        Align: =Align.Center
        FontWeight: =FontWeight.Bold
        Height: =70
        Size: =21
        Text: ="ADMIN LOGIN"
        Width: =560
        X: =40
        Y: =290
        ZIndex: =4

    PasswordLabel_5 As label:
        Height: =70
        Size: =21
        Text: |-
            ="Paasword
            "
        Width: =560
        X: =46
        Y: =516
        ZIndex: =8

    Passwordinput_1 As text:
        BorderColor: |-
            =ColorValue("#E3562B")
        Default: =
        Height: =70
        HintText: ="Enter your Password"
        Mode: =If(varShowPassword, TextMode.SingleLine, TextMode.Password)
        OnChange: |-
            =If(showError, UpdateContext({showError: false}))
        OnSelect: =Set(showError, false)
        PaddingLeft: =50
        Size: =21
        Width: =541
        X: =46
        Y: =586
        ZIndex: =9

    Passwordicon_7 As icon.Lock:
        Color: |-
            =ColorValue("#E3562B")
        Height: =44
        Icon: =Icon.Lock
        Width: =36
        X: =51
        Y: =599
        ZIndex: =10

    ViewIcon_5 As icon.View:
        Height: =44
        Icon: =If(varShowPassword, Icon.Hide, Icon.View)
        OnSelect: =Set(varShowPassword, !varShowPassword)
        Width: =36
        X: =538
        Y: =599
        ZIndex: =11

    labelError_3 As label:
        Height: =30
        Size: =15
        Text: ="Password or User Email is incorrect. Please Try Again."
        Visible: =showError
        Width: =555
        X: =51
        Y: =691
        ZIndex: =12

    ForgetPasswordbutton_1 As button:
        Color: =RGBA(151, 0, 0, 1)
        DisabledFill: =RGBA(0, 0, 0, 0)
        Fill: =RGBA(0, 0, 0, 0)
        Height: =38
        HoverBorderColor: =RGBA(0,0,0,0)
        HoverFill: =RGBA(0, 0, 0, 0)
        OnSelect: =Navigate(EnterEmail)
        PressedBorderColor: =RGBA(0,0,0,0)
        PressedFill: =RGBA(0,0,0,0)
        Size: =12
        Text: ="Forgot Password"
        Width: =210
        X: =207
        Y: =735
        ZIndex: =13

    Loginbutton_3 As button:
        Fill: |-
            =ColorValue("#E3562B")
        Height: =56
        OnSelect: |-
            =Set(
                varAdmin,
                LookUp(
                    'Admin (Affiliate)',
                    Lower(Trim(Email)) = Lower(Trim(Userinput_1.Text)) &&
                    Trim(Password) = Trim(Passwordinput_1.Text)
                )
            );
            
            If(
                !IsBlank(varAdmin),
                
                // Success
                Set(varadminEmail, varAdmin.Email);
                UpdateContext({showError: false});
                Navigate(Admin_Product_Upload, ScreenTransition.Fade),
            
                // Invalid credentials
                UpdateContext({showError: true})
            );
            
            Reset(Userinput_1);
            Reset(Passwordinput_1);
        Size: =24
        Text: ="Login"
        Width: =176
        X: =224
        Y: =794
        ZIndex: =14

    Icon10_10 As icon:
        Color: |-
            =ColorValue("#FAF4DF")
        Fill: |-
            =ColorValue("#E3562B")
        Height: =40
        Icon: =Icon.BackArrow
        OnSelect: =Navigate(LoginScreen)
        Width: =44
        X: =7
        Y: =12
        ZIndex: =15

    Group5_1 As group:
        Height: =5
        Width: =5
        X: =60
        Y: =60
        ZIndex: =15

        EmailLabel_8 As label:
            Height: =70
            Size: =21
            Text: ="Email "
            Width: =560
            X: =48
            Y: =373
            ZIndex: =5

        Userinput_1 As text:
            BorderColor: |-
                =ColorValue("#E3562B")
            Default: =
            Height: =70
            HintText: ="Enter your Email"
            OnChange: |-
                =If(showError, UpdateContext({showError: false}))
            OnSelect: =Set(showError, false)
            PaddingLeft: =50
            Size: =21
            Width: =541
            X: =48
            Y: =443
            ZIndex: =6

        usericon_6 As icon.AddUser:
            Color: |-
                =ColorValue("#E3562B")
            Height: =44
            Icon: =Icon.AddUser
            Width: =36
            X: =51
            Y: =456
            ZIndex: =7

