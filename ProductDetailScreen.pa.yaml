Screens:
  ProductDetailScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =// Remove duplicate
        RemoveIf(colLastViewed, ID = varSelectedProduct.ID);

        // Add current product to top
        Collect(colLastViewed, varSelectedProduct);

        // Keep only last 10 items
        If(CountRows(colLastViewed) > 10,
            Remove(colLastViewed, First(colLastViewed))
        );

        // Save to device
    Children:
      - Header_11:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - Container_3:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =ColorValue("#E3562B")
            Height: =64
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutWrap: =true
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =640
            Y: =1072
          Children:
            - Homeicon_5:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Home
                  OnSelect: =Navigate(HomeScreen)
                  Width: =44
                  X: =87
                  Y: =761
            - Searchicon_4:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
