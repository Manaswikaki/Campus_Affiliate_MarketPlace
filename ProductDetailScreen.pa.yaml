      - lbl_productCategory:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =36
            Size: =15
            Text: =varSelectedProduct.CATEGORY
            Width: =243
            X: =25
            Y: =565
      - lbl_productDiscount:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =Color.Green
            Font: =Font.'Open Sans'
            Height: =45
            Size: =20
            Text: |-
              =If(
                  !IsBlank(varSelectedProduct.Discount) && varSelectedProduct.Discount > 0,
                  "↓ " & varSelectedProduct.Discount & "%",
                  ""
              )
            Width: =104
            X: =217
            Y: =lbl_productName.Y + lbl_productName.Height + 5
      - lbl_productRating:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: |-
              =With(
                  {
                      rate: Value(Substitute(varSelectedProduct.RATING, " ★", ""))
                  },
                  If(
                      rate >= 4, Color.Green,
                      rate >= 3, Color.Orange,
                      Color.Red
                  )
              )
            Fill: |-
              =With(
                  {
                      rate: Value(Substitute(varSelectedProduct.RATING, "★", ""))
                  },
                  If(
                      !IsBlank(rate) && rate >= 4, RGBA(0, 200, 0, 0.15),
                      !IsBlank(rate) && rate >= 3, RGBA(255, 165, 0, 0.15),
                      RGBA(255, 0, 0, 0.15)
                  )
              )
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =45
            Text: =Text(Value(varSelectedProduct.RATING), "0.0") & " ★"
            Width: =92
            X: =344
            Y: =lbl_productName.Y + lbl_productName.Height + 5
      - Button2:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =Color.Black
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(255, 216, 20, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(245, 205, 0, 1)
            OnSelect: |-
              =// 1. Run the flow and capture the response into a record variable
              //Set(
                //  flowResponse,
                  //TrackClickFlow.Run(
                    //  varSelectedProduct.PRODUCTID,
                      //varSelectedProduct.PRODUCTNAME,
                     // User().Email,
                     // varSelectedProduct.PURCHASELINK
                  //)
              //);

              // 2. Extract the specific 'link' property from that record
              //Set(varShareLink, flowResponse.AppShareLink);

              // 3. Launch the link only if it is not blank to avoid errors
              //If(
                //  !IsBlank(varShareLink),
                 //Launch(varShareLink)
              //)
              Launch(varSelectedProduct.PURCHASELINK)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Size: =20
            Text: ="Buy Now At " & "₹" & varSelectedProduct.DISCOUNTPRICE
            Width: =316
            X: =322
            Y: =1002
      - Button2_1:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(200, 200, 200, 1)
            BorderThickness: =1
            Color: =Color.Black
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(240, 240, 240, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            HoverBorderColor: =RGBA(0,0,0,0)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(230, 230, 230, 1)
            OnSelect: |-
              =If(
                  IsBlank(
                      LookUp(
                          Favorites,
                          PRODUCTID = varSelectedProduct.Title &&
                          UserEmail = varUserEmail
                      )
                  ),

                  // ✅ ADD to Favorites
              Patch(
                  Favorites,
                  Defaults(Favorites),
                  {
                      Title: varSelectedProduct.Title,
                      PRODUCTNAME: varSelectedProduct.PRODUCTNAME,
                      PURCHASELINK: Left(varSelectedProduct.PURCHASELINK, 255),
                      Sub_Category: varSelectedProduct.Sub_Category,
                      UserEmail: varUserEmail,
                      PRODUCTID: Text(varSelectedProduct.ID),
                      CATEGORY: varSelectedProduct.CATEGORY,
                      BRAND: varSelectedProduct.BRAND,
                      PRICE: varSelectedProduct.PRICE,
                      RATING: varSelectedProduct.RATING,
                      STOCKSTATUS: varSelectedProduct.STOCKSTATUS,
                      IMAGEURL: Left(varSelectedProduct.IMAGEURL, 255),
                      PLATFORM: varSelectedProduct.PLATFORM,
                      Description: Left(varSelectedProduct.Description, 255),
                      Discount: varSelectedProduct.Discount,
                      Features: Left(varSelectedProduct.Features, 255)
                  }
              ),

                  // ❌ REMOVE from Favorites
                  Remove(
                      Favorites,
                      LookUp(
                          Favorites,
                          PRODUCTID = varSelectedProduct.Title &&
                          UserEmail = varUserEmail
                      )
                  )
              )
            PressedBorderColor: =RGBA(0,0,0,0)
            PressedColor: =Self.Fill
            PressedFill: =RGBA(0,0,0,0)
            Size: =20
            Text: ="Add to Favourite"
            Width: =322
            Y: =1002
      - Icon4:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#E3562B")
            Height: =46
            Icon: =Icon.Share
            OnSelect: |-
              =Set(
