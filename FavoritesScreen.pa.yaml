Screens:
  FavoritesScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - Gallery2:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageTwoColumnVariant_ver5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            DelayItemLoading: =true
            Height: =986
            Items: |-
              =Filter(
                  Favorites,
                  UserEmail = varUserEmail
              )
            LoadingSpinner: =LoadingSpinner.Data
            OnSelect: |-
              =Set(
                  varSelectedProduct,
                  LookUp(
                      List_Products,   // 👈 your main products list
                      ID = Value(ThisItem.PRODUCTID)
                  )
              );
              Navigate(ProductDetailScreen);
            TemplateSize: =467
            Y: =85
          Children:
            - Image_fav:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =Min(Self.Width, Parent.TemplateHeight - 115)
                  Image: =ThisItem.IMAGEURL
                  ImagePosition: =ImagePosition.Fill
                  OnSelect: =Select(Parent)
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =Parent.TemplateWidth - 32
                  X: =16
                  Y: =1
            - Name_fav:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =RGBA(50, 49, 48, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =22
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =15
                  Text: =ThisItem.PRODUCTNAME
                  VerticalAlign: =VerticalAlign.Top
                  Width: =288
                  X: =16
                  Y: =289
            - Actual_fav:
                Control: HtmlViewer@2.1.0
                Properties:
                  Font: =Font.'Open Sans'
                  Height: =50
                  HtmlText: |-
                    ="<span style='text-decoration:line-through; color:gray;'>₹" & 
                    ThisItem.PRICE & 
                    "</span>   " &

                    "<span style='color:black; font-weight:bold;'>₹" & 
                    Round(ThisItem.PRICE * (1 - ThisItem.Discount/100), 0) & 
                    "</span>"
                  OnSelect: =Select(Parent)
                  Size: =15
                  Width: =132
                  X: =12
                  Y: =342
            - lbl_productRating_fav:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: |-
                    =If(
                        Value(Substitute(ThisItem.RATING, "★", "")) >= 4, Color.Green,
                        Value(Substitute(ThisItem.RATING, "★", "")) >= 3, Color.Orange,
                        Color.Red
                    )
                  Fill: |-
                    =With(
                        {
                            rate: Value(Substitute(ThisItem.RATING, "★", ""))
                        },
                        If(
                            rate >= 4, RGBA(0, 200, 0, 0.15),      // Light Green
                            rate >= 3, RGBA(255, 165, 0, 0.15),    // Light Orange
                            RGBA(255, 0, 0, 0.15)                  // Light Red
                        )
                    )
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  Height: =31
                  Size: =14
                  Text: =Text(Value(ThisItem.RATING), "0.0") & " ★"
                  Width: =62
                  X: =16
                  Y: =377
            - Buttonbuy:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(56, 96, 178, 1)
                  Font: =Font.'Open Sans'
                  Height: =36
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnSelect: =Launch(ThisItem.'PURCHASELINK')
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Size: =15
                  Text: ="Buy Now"
                  Width: =277
                  X: =21
                  Y: =424
            - Discount:
                Control: Label@2.5.1
                Properties:
                  AutoHeight: =true
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: |-
                    =If(
                        Value(Substitute(ThisItem.Discount, "%", "")) <= 30, Color.Red,
                        Value(Substitute(ThisItem.Discount, "%", "")) <= 70, Color.Orange,
                        Color.Green
                    )
                  Font: =Font.'Lato Black'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =27
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =15
                  Text: =ThisItem.Discount & "% OFF"
                  VerticalAlign: =VerticalAlign.Top
                  Width: =85
                  X: =20
                  Y: =318
            - d_price:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =RGBA(50, 49, 48, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =30
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =13
                  Text: =ThisItem.DISCOUNTPRICE
                  VerticalAlign: =VerticalAlign.Top
                  Width: =132
                  X: =120
                  Y: =331
      - Container_4:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =ColorValue("#E3562B")
            Height: =64
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutWrap: =true
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =640
            Y: =1072
          Children:
            - Homeicon_6:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Home
                  OnSelect: =Navigate(HomeScreen)
                  Width: =44
                  X: =87
                  Y: =761
            - Searchicon_5:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Search
                  OnSelect: =Navigate(SearchScreen)
                  Width: =44
                  X: =189
                  Y: =777
            - Wishlisticon_5:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =35
                  Icon: =Icon.Support
                  OnSelect: =Launch("https://share.chatling.ai/s/PjD8JKwqYbE7ELC")
                  Width: =44
                  X: =327
                  Y: =801
            - Icon1_5:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =44
                  Icon: =Icon.ListScrollWatchlist
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  OnSelect: =Navigate(CategoriesScreen)
                  Width: =44
            - Profileicon_5:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =ColorValue("#FAF4DF")
                  FillPortions: =1
                  Height: =40
                  Icon: =Icon.Person
                  OnSelect: =Navigate(ProfileScreen)
                  Width: =44
                  X: =523
                  Y: =701
      - Header_12:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =ColorValue("#E3562B")
            Height: =64
            Width: =640
      - Icon10_5:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =ColorValue("#FAF4DF")
            Height: =40
            Icon: =Icon.BackArrow
            OnSelect: =Navigate(SearchScreen)
            Width: =44
            X: =7
            Y: =12
